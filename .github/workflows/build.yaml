name: Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build
      run: msbuild GP11_20260306.slnx /p:Configuration=Release /p:PlatformToolset=v143

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: x64/Release/